name: CI

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:

jobs:
  web-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

  ios-quality:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and test iOS
        run: |
          set -euo pipefail
          SIMULATOR_ID="$(xcrun simctl list devices available | awk -F'[()]' '/iPhone/ { print $2; exit }')"
          if [ -z "$SIMULATOR_ID" ]; then
            echo "No available iPhone simulator found."
            exit 1
          fi
          xcodebuild test \
            -project ios/Basaltemperatur.xcodeproj \
            -scheme Basaltemperatur \
            -destination "id=$SIMULATOR_ID" \
            CODE_SIGNING_ALLOWED=NO
